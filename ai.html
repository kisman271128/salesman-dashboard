<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insight - Salesman App</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #E0F7FA, #B2EBF2) !important;
            min-height: 100vh;
            color: #E0F7FA;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        


        
        /* ════════════════════════════════════════════════════
           LIGHT CYAN THEME - Complete Override
           ════════════════════════════════════════════════════ */

        /* BASE */
        html, body {
            background: linear-gradient(135deg, #E0F7FA 0%, #B2EBF2 50%, #E8F5F9 100%) !important;
            color: #1A1A2E !important;
        }
        .container, .app-container, .main-wrapper {
            background: linear-gradient(135deg, #E0F7FA, #CCF2F7) !important;
            min-height: 100vh;
        }
        .main-content { background: transparent !important; }

        /* HEADER */
        .header, .detail-header {
            background: linear-gradient(135deg, #17B5C8, #1BC8DC) !important;
            border-radius: 0 0 24px 24px !important;
            box-shadow: 0 4px 16px rgba(27,200,220,0.25) !important;
            border-bottom: none !important;
        }
        .header *, .detail-header * { color: #FFFFFF !important; }
        .depo-name, .detail-title, .salesman-name, .page-title {
            color: #FFFFFF !important; font-weight: 800 !important;
        }
        .region-name, .subtitle { color: rgba(255,255,255,0.85) !important; }
        .menu-btn, .notification-btn, .back-btn, .user-btn, .more-btn, .refresh-btn {
            background: rgba(255,255,255,0.25) !important;
            border: 1px solid rgba(255,255,255,0.4) !important;
            color: #FFFFFF !important;
        }
        .menu-btn:hover, .back-btn:hover, .notification-btn:hover {
            background: rgba(255,255,255,0.4) !important;
        }
        .notification-dot { background: #E74C3C !important; }

        /* ══ SEMUA CARD / FRAME → PUTIH ══ */
        .card, .info-card, .metric-card, .stat-card, .summary-card,
        .detail-card, .visit-card, .profile-card, .insight-card,
        .performance-card, .outlet-card, .plan-card, .sku-card,
        .report-card, .journey-card, .compliance-card, .device-card,
        .user-card, .db-card, .insentif-card, .period-card,
        .location-card, .filter-frame, .login-card, .salesman-section,
        .chart-section, .activity-menu, .logout-modal, .metrics-container,
        .section-card, .content-box, .info-box, .process-section,
        .donut-section, .chart-container, .tab-panel, .panel-content,
        .list-card, .searchable-select, .customer-card, .sku-frame,
        .visit-form, .plan-form-section, .outlet-list-section,
        .ai-container, .chat-container, .provider-bar,
        .quick-chips-container, .map-info-panel, .analytics-card,
        .db-section, .device-section, .compliance-card,
        .lob-section, .process-card, .summary-box {
            background: #FFFFFF !important;
            border: none !important;
            box-shadow: 0 6px 20px rgba(27,200,220,0.12), 0 2px 8px rgba(0,0,0,0.06) !important;
            border-radius: 16px !important;
            color: #1A1A2E !important;
        }

        /* Teks di dalam card */
        .card *, .info-card *, .metric-card *, .stat-card *,
        .summary-card *, .detail-card *, .salesman-section *,
        .chart-section *, .performance-card *, .activity-menu *,
        .logout-modal *, .metrics-container *, .process-section *,
        .filter-frame *, .profile-card *, .ai-container *,
        .chat-container *, .db-section *, .device-section *,
        .analytics-card *, .lob-section * { color: #1A1A2E !important; }

        /* Label & judul dalam card */
        .metric-label, .card-label, .stat-label, .section-label,
        .chart-title, .card-title, .section-title, .panel-title {
            color: #17B5C8 !important; font-weight: 700 !important;
        }
        .metric-value, .card-value, .stat-value, .big-number {
            color: #1A1A2E !important; font-weight: 800 !important;
        }
        .metric-subtitle, .card-subtitle, .helper-text { color: #546E7A !important; }
        .depo-name-inner { color: #17B5C8 !important; }

        /* Metric card border kiri */
        .metric-card.total      { border-left: 4px solid #1BC8DC !important; }
        .metric-card.wholesaler { border-left: 4px solid #27AE60 !important; }
        .metric-card.retail     { border-left: 4px solid #F39C12 !important; }
        .metric-card.mti        { border-left: 4px solid #E74C3C !important; }

        /* ══ LOB CARDS ══ */
        .lob-card,
        .lob-card.color-0, .lob-card.color-1, .lob-card.color-2,
        .lob-card.color-3, .lob-card.color-4, .lob-card.color-5,
        .lob-card.color-6, .lob-card.color-7, .lob-card.color-8 {
            background: #FFFFFF !important;
            border: 2px solid #B2EBF2 !important;
            box-shadow: 0 4px 12px rgba(27,200,220,0.1) !important;
        }
        .lob-card * { color: #1A1A2E !important; }

        .lob-card.achievement-high {
            background: #E8F5E9 !important; border-color: #81C784 !important;
            box-shadow: 0 4px 12px rgba(39,174,96,0.15) !important;
        }
        .lob-card.achievement-high * { color: #1B5E20 !important; }
        .lob-card.achievement-medium {
            background: #FFFDE7 !important; border-color: #FFD54F !important;
            box-shadow: 0 4px 12px rgba(243,156,18,0.15) !important;
        }
        .lob-card.achievement-medium * { color: #5A3E00 !important; }
        .lob-card.achievement-low {
            background: #FFEBEE !important; border-color: #EF9A9A !important;
            box-shadow: 0 4px 12px rgba(231,76,60,0.15) !important;
        }
        .lob-card.achievement-low * { color: #B71C1C !important; }

        /* Total card - cyan */
        .total-card-first {
            background: linear-gradient(135deg, #1BC8DC, #17B5C8) !important;
            border: none !important;
            box-shadow: 0 8px 24px rgba(27,200,220,0.35) !important;
        }
        .total-card-first * { color: #FFFFFF !important; }
        .total-card-first .achievement-percentage { color: #FFE500 !important; font-size: 28px !important; }
        .total-card-first .lob-name { color: #FFFFFF !important; }

        /* Achievement text */
        .achievement-percentage { color: #17B5C8 !important; text-shadow: none !important; font-weight: 900 !important; }
        .achievement-text { color: #1BC8DC !important; opacity: 1 !important; text-transform: uppercase !important; }
        .lob-name { color: #1A1A2E !important; font-weight: 800 !important; }
        .actual-info { color: #444 !important; opacity: 1 !important; }
        .gap-info { color: #777 !important; opacity: 1 !important; }
        .vs-label { color: #78909C !important; opacity: 1 !important; }
        .vs-value { color: #17B5C8 !important; }

        /* ══ TABEL ══ */
        .table-container, .table-wrapper, .vr-table-wrapper, .data-table-wrapper {
            background: #FFFFFF !important;
            border-radius: 16px !important;
            box-shadow: 0 6px 20px rgba(27,200,220,0.12) !important;
        }
        .table-header {
            background: linear-gradient(135deg, #17B5C8, #1BC8DC) !important;
            color: #FFFFFF !important; font-weight: 700 !important;
        }
        .data-table th, .vr-table th, table thead th {
            background: #E0F7FA !important; color: #006064 !important;
            border-bottom: 2px solid #B2EBF2 !important; font-weight: 700 !important;
        }
        .data-table td, .vr-table td, table tbody td {
            background: #FFFFFF !important; color: #1A1A2E !important;
            border-bottom: 1px solid #E8F8FA !important;
        }
        table tbody tr:nth-child(even) td { background: #F5FDFE !important; }
        table tbody tr:hover td { background: #E0F7FA !important; }
        .sticky-col { background: #E0F7FA !important; color: #006064 !important; }
        .data-table tbody .sticky-col { background: #FFFFFF !important; color: #1A1A2E !important; }
        .data-table tbody tr:nth-child(even) .sticky-col { background: #F5FDFE !important; }
        .data-table tbody tr:hover .sticky-col { background: #E0F7FA !important; }
        .total-row, .total-row td {
            background: #E0F7FA !important; color: #006064 !important;
            font-weight: 700 !important; border-top: 2px solid #1BC8DC !important;
        }
        .total-row .sticky-col { background: #E0F7FA !important; }
        .total-row:hover td { background: #B2EBF2 !important; }
        .vr-table thead tr { background: #E0F7FA !important; }
        .vr-table tbody tr:nth-child(even) { background: #F5FDFE !important; }
        .vr-table tbody tr:hover { background: #E0F7FA !important; }

        /* Value colors */
        .value-positive { color: #27AE60 !important; font-weight: 700 !important; }
        .value-negative { color: #E74C3C !important; font-weight: 700 !important; }
        .value-percentage { color: #17B5C8 !important; font-weight: 700 !important; }
        .ach-high   { color: #27AE60 !important; font-weight: 700 !important; }
        .ach-medium { color: #F39C12 !important; font-weight: 700 !important; }
        .ach-low    { color: #E74C3C !important; font-weight: 700 !important; }

        /* ══ TABS / FILTER ══ */
        .tab-btn, .filter-btn, .period-btn, .chart-period,
        .tab-scroll button, .tabs-container button, .tab-item {
            background: rgba(255,255,255,0.7) !important;
            border: 1px solid rgba(27,200,220,0.3) !important;
            color: #17B5C8 !important; border-radius: 10px !important;
        }
        .tab-btn.active, .filter-btn.active, .period-btn.active,
        .tab-item.active, .chart-period.active {
            background: #1BC8DC !important; color: #FFFFFF !important;
            border-color: #1BC8DC !important; font-weight: 700 !important;
        }
        .tabs-container, .tab-scroll, .filter-row, .filter-tabs {
            background: rgba(255,255,255,0.5) !important;
            border-radius: 14px !important;
        }

        /* ══ INPUT / SELECT ══ */
        input[type="text"], input[type="search"], input[type="number"],
        input[type="password"], input[type="email"], input[type="date"],
        select, textarea, .search-input, .search-select, .input-field {
            background: #F0FAFB !important; color: #1A1A2E !important;
            border: 2px solid #B2EBF2 !important; border-radius: 10px !important;
        }
        input:focus, select:focus, textarea:focus, .search-input:focus {
            border-color: #1BC8DC !important;
            box-shadow: 0 0 0 3px rgba(27,200,220,0.15) !important;
            outline: none !important; background: #FFFFFF !important;
        }
        input::placeholder, textarea::placeholder, .search-input::placeholder {
            color: rgba(26,26,46,0.4) !important;
        }
        select option { background: #FFFFFF !important; color: #1A1A2E !important; }

        /* ══ DROPDOWN ══ */
        .search-dropdown { background: #FFFFFF !important; border: 1px solid #B2EBF2 !important; box-shadow: 0 8px 20px rgba(0,0,0,0.1) !important; }
        .search-option { background: #FFFFFF !important; color: #1A1A2E !important; }
        .search-option:hover, .search-option.selected { background: #E0F7FA !important; color: #006064 !important; }

        /* ══ BUTTONS ══ */
        .btn-primary, .btn-auto, .login-btn, .submit-btn, .action-btn-primary {
            background: linear-gradient(135deg, #17B5C8, #1BC8DC) !important;
            color: #FFFFFF !important; border: none !important;
            box-shadow: 0 4px 14px rgba(27,200,220,0.35) !important;
        }
        .btn-secondary, .action-btn-secondary {
            background: #F0FAFB !important; color: #17B5C8 !important;
            border: 2px solid #1BC8DC !important;
        }
        .btn-danger  { background: #FFEBEE !important; color: #B71C1C !important; border: 1px solid #EF9A9A !important; }
        .btn-warning { background: #FFFDE7 !important; color: #5A3E00 !important; border: 1px solid #FFD54F !important; }
        .btn-success { background: #E8F5E9 !important; color: #1B5E20 !important; border: 1px solid #81C784 !important; }

        /* ══ BOTTOM NAV ══ */
        .bottom-nav {
            background: #FFFFFF !important;
            border-top: 1px solid #B2EBF2 !important;
            box-shadow: 0 -4px 16px rgba(27,200,220,0.12) !important;
        }
        .nav-item { color: #90CAD0 !important; }
        .nav-item.active {
            color: #1BC8DC !important; background: transparent !important;
            border-bottom: 2.5px solid #1BC8DC !important;
        }
        .nav-item.active .nav-label, .nav-item.active .nav-icon { color: #1BC8DC !important; }
        .nav-item:hover:not(.disabled) { color: #17B5C8 !important; }
        .nav-label { color: inherit !important; }
        .nav-icon.home { background: #1BC8DC !important; color: white !important; }
        .nav-icon.visit { background: #E74C3C !important; color: white !important; }
        .nav-icon.data  { background: #27AE60 !important; color: white !important; }
        .nav-icon.profile { background: #F39C12 !important; color: white !important; }

        /* ══ ACTIVITY MENU ══ */
        .activity-menu-item {
            background: #F0FAFB !important; border: 1px solid #B2EBF2 !important;
            border-radius: 12px !important; color: #1A1A2E !important;
        }
        .activity-menu-item:hover { background: #E0F7FA !important; border-color: #80DEEA !important; }
        .activity-menu-item-title { color: #006064 !important; font-weight: 600 !important; }
        .activity-menu-item-desc  { color: #546E7A !important; }
        .activity-menu-title { color: #17B5C8 !important; font-weight: 700 !important; }
        .activity-menu-header { background: #FFFFFF !important; }
        .activity-menu-footer button, .activity-menu-close-btn {
            background: #1BC8DC !important; color: #FFFFFF !important;
            border: none !important; border-radius: 12px !important;
        }

        /* ══ LOGOUT MODAL ══ */
        .logout-modal { background: #FFFFFF !important; }
        .logout-modal-header { background: linear-gradient(135deg, #17B5C8, #1BC8DC) !important; color: #FFFFFF !important; }
        .logout-modal-header * { color: #FFFFFF !important; }
        .logout-modal-body, .logout-modal-footer { background: #FFFFFF !important; }
        .logout-modal-title { color: #17B5C8 !important; }

        /* ══ AI / CHAT ══ */
        .chat-messages, #chatMessages, .messages-area {
            background: #F0FAFB !important;
        }
        .message-bubble.user { background: #1BC8DC !important; color: #FFFFFF !important; border-radius: 16px 16px 4px 16px !important; }
        .message-bubble.ai, .message-bubble.assistant {
            background: #FFFFFF !important; color: #1A1A2E !important;
            border: 1px solid #B2EBF2 !important; border-radius: 16px 16px 16px 4px !important;
        }
        .chat-input-container, .input-area, .bottom-input {
            background: #FFFFFF !important; border-top: 1px solid #B2EBF2 !important;
        }
        .provider-btn, .provider-tab {
            background: #F0FAFB !important; border: 1px solid #B2EBF2 !important; color: #546E7A !important;
        }
        .provider-btn.active, .provider-tab.active {
            background: #1BC8DC !important; color: #FFFFFF !important; border-color: #1BC8DC !important;
        }
        .quick-chip {
            background: #E0F7FA !important; color: #006064 !important;
            border: 1px solid #80DEEA !important; border-radius: 20px !important;
        }
        .quick-chip:hover { background: #B2EBF2 !important; }

        /* ══ CHARTS ══ */
        .chart-line-so     { stroke: #1BC8DC !important; }
        .chart-line-do     { stroke: #FF6B9D !important; }
        .chart-line-target { stroke: #F39C12 !important; stroke-dasharray: 5,3 !important; }
        .chart-grid-line   { stroke: rgba(27,200,220,0.15) !important; }
        .chart-axis-text   { fill: #78909C !important; }

        /* ══ PROGRESS BAR ══ */
        .progress-bar, .progress-track { background: #E0F7FA !important; border-radius: 8px !important; }
        .progress-fill { background: linear-gradient(90deg, #17B5C8, #1BC8DC) !important; }

        /* ══ BADGES ══ */
        .badge-success, [class*="status"][class*="good"] { background: #E8F5E9 !important; color: #1B5E20 !important; border: 1px solid #81C784 !important; }
        .badge-danger, [class*="status"][class*="bad"]   { background: #FFEBEE !important; color: #B71C1C !important; border: 1px solid #EF9A9A !important; }
        .badge-warning { background: #FFFDE7 !important; color: #5A3E00 !important; border: 1px solid #FFD54F !important; }
        .badge-info    { background: #E0F7FA !important; color: #006064 !important; border: 1px solid #80DEEA !important; }

        /* ══ LOADING / SPINNER ══ */
        .spinner { border-color: rgba(27,200,220,0.2) !important; border-top-color: #1BC8DC !important; }
        .loading-text { color: #17B5C8 !important; }

        /* ══ ERRORS ══ */
        .error-message, .error-box {
            background: #FFEBEE !important; border: 1px solid #EF9A9A !important; color: #B71C1C !important;
        }

        /* ══ MAP / LOCATION ══ */
        .map-container { border: 2px solid #B2EBF2 !important; border-radius: 16px !important; overflow: hidden !important; }
        .location-info, .map-legend { background: #FFFFFF !important; color: #1A1A2E !important; }

        /* ══ SCROLLBAR ══ */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #E0F7FA; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #1BC8DC; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #17B5C8; }

        /* ══ DIVIDERS ══ */
        hr, .divider { border-color: #B2EBF2 !important; }
        .section-header { border-bottom: 2px solid rgba(27,200,220,0.2) !important; }

        /* ══ LINKS ══ */
        a { color: #17B5C8 !important; }
        a:hover { color: #1BC8DC !important; }

        /* ══ ADMIN BADGE ══ */
        .admin-badge { background: linear-gradient(135deg, #F39C12, #E67E22) !important; color: white !important; }

        </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="header-info">
            <div class="header-title">
                🤖 AI Insight
                <span class="ai-status-dot"></span>
            </div>
            <div class="header-subtitle">Analisis otomatis data sales real-time</div>
        </div>
        <button class="back-btn" onclick="refreshInsight()" title="Refresh">↻</button>
    </div>

    <!-- PROVIDER TOGGLE BAR -->
    <div class="provider-bar">
        <span class="provider-label">AI Provider:</span>
        <div class="provider-toggle">
            <button class="provider-btn groq active" id="btnGroq" onclick="switchProvider('groq')">
                ⚡ Groq
            </button>
            <button class="provider-btn gemini" id="btnGemini" onclick="switchProvider('gemini')">
                ✨ Gemini
            </button>
        </div>
        <span class="provider-status ok" id="providerStatus">● Siap</span>
    </div>

    <!-- SCROLL AREA -->
    <div class="main-scroll" id="mainScroll">

        <!-- Auto insight loading placeholder -->
        <div class="insight-loading" id="insightLoading">
            <div class="spinner"></div>
            <p id="loadingText">🔍 Memuat semua data...</p>
            <div class="sub" id="loadingSub">Membaca data dari semua file JSON</div>
        </div>

        <!-- Insight cards will be injected here -->
        <div id="insightCards" style="display:none; display:flex; flex-direction:column; gap:12px;"></div>

        <!-- Chat divider -->
        <div class="chat-divider" id="chatDivider" style="display:none;">
            <hr><span>💬 Tanya lebih lanjut</span><hr>
        </div>

        <!-- Suggestion chips -->
        <div class="chip-row" id="chipRow" style="display:none;">
            <div class="chip" onclick="askChip('Siapa salesman dengan achievement tertinggi dan terendah?')">🏆 Top vs Bottom</div>
            <div class="chip" onclick="askChip('Salesman mana yang CR dan CA-nya paling bermasalah?')">⚠️ CR/CA Alert</div>
            <div class="chip" onclick="askChip('LOB mana yang gap-nya paling besar bulan ini?')">📊 Gap per LOB</div>
            <div class="chip" onclick="askChip('Outlet pareto mana yang belum tercapai dan harus dikunjungi segera?')">🏪 Pareto Alert</div>
        </div>

        <!-- Chat messages container -->
        <div id="chatMessages" style="display:flex; flex-direction:column; gap:10px;"></div>

    </div>

    <!-- INPUT BAR -->
    <div class="input-bar">
        <div class="input-wrap">
            <textarea id="chatInput" placeholder="Tanya sesuatu tentang data sales..." rows="1"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            ➤
        </button>
    </div>

</div>
<script>
// ═══════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════
const PROVIDERS = {
    groq: {
        url:   '/api/ai',
        model: 'llama-3.1-8b-instant',   // hemat token, cepat
        name:  'Groq (Llama)',
    },
    gemini: {
        url:   '/api/gemini',
        model: 'gemini-2.0-flash',        // gratis, 1M token/hari
        name:  'Google Gemini',
    }
};

const DATA_DIR = 'data/';
const DATA_FILES = {
    performance:    'd.performance.json',
    dashboard:      'd.dashboard.json',
    salesmanProses: 'd.salesmanproses.json',
    depoProses:     'd.depoproses.json',
    pareto:         'd.30pareto.json',
    channel:        'd.channel.json',
    channelProj:    'd.channelproj.json',
    area:           'd.area.json',
    pcacec:         'd.pcacec.json',
    tpom:           'd.tpom.json',
    tsales:         'd.tsales.json',
    salesman:       'd.salesman.json',
    details:        'd.details.json',
    jks:            'd.jks.json',
    sku:            'd.sku.json',
    skupelanggan:   'd.skupelanggan.json',
    salesmanlob:    'd.salesmanlob.json',
    project:        'd.project.json',
};

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentProvider = 'groq';
let allData = {};
let conversationHistory = [];
let isLoading = false;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('chatInput').addEventListener('input', toggleSendBtn);

    // Load provider preference dari localStorage
    const saved = localStorage.getItem('ai_provider');
    if (saved && PROVIDERS[saved]) switchProvider(saved, false);

    await loadAllDataAndInsight();
});

// ═══════════════════════════════════════════════
//  PROVIDER SWITCH
// ═══════════════════════════════════════════════
function switchProvider(name, doRefresh = true) {
    if (!PROVIDERS[name]) return;
    currentProvider = name;
    localStorage.setItem('ai_provider', name);

    // Update UI toggle
    document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn' + name.charAt(0).toUpperCase() + name.slice(1))?.classList.add('active');

    setProviderStatus('ok', '● ' + PROVIDERS[name].name);

    // Reset chat & refresh insight jika data sudah ada
    if (doRefresh && Object.keys(allData).length > 0) {
        conversationHistory = [];
        document.getElementById('chatMessages').innerHTML = '';
        document.getElementById('insightCards').innerHTML = '';
        document.getElementById('chatDivider').style.display = 'none';
        document.getElementById('chipRow').style.display = 'none';
        generateAutoInsight();
    }
}

function setProviderStatus(type, text) {
    const el = document.getElementById('providerStatus');
    if (!el) return;
    el.className = 'provider-status ' + type;
    el.textContent = text;
}

// ═══════════════════════════════════════════════
//  LOAD SEMUA FILE JSON
// ═══════════════════════════════════════════════
async function loadNDJSON(filename) {
    try {
        const res = await fetch(DATA_DIR + filename);
        if (!res.ok) return [];
        const text = await res.text();
        return text.trim().split('\n')
            .filter(l => l.trim())
            .map(l => { try { return JSON.parse(l); } catch { return null; } })
            .filter(Boolean);
    } catch { return []; }
}

async function loadAllDataAndInsight() {
    setLoading('🔍 Memuat semua data...', 'Membaca file JSON...');

    const keys = Object.keys(DATA_FILES);
    const results = await Promise.all(keys.map(k => loadNDJSON(DATA_FILES[k])));
    keys.forEach((k, i) => { allData[k] = results[i]; });

    const loaded = keys.filter((k, i) => results[i].length > 0);
    setLoading('🤖 Menganalisis data...', `${loaded.length} file dimuat — ${PROVIDERS[currentProvider].name} menganalisis...`);

    await generateAutoInsight();
}

function setLoading(title, sub) {
    const t = document.getElementById('loadingText');
    const s = document.getElementById('loadingSub');
    if (t) t.textContent = title;
    if (s) s.textContent = sub;
}

// ═══════════════════════════════════════════════
//  AUTO INSIGHT
// ═══════════════════════════════════════════════
async function generateAutoInsight() {
    const prompt = buildInsightPrompt();
    document.getElementById('insightLoading').style.display = 'flex';
    setProviderStatus('warn', '⏳ Memproses...');

    try {
        const raw = await callAI([{ role: 'user', content: prompt }], 1500);

        conversationHistory.push({ role: 'user', content: prompt });
        conversationHistory.push({ role: 'assistant', content: raw });

        renderInsightCards(raw);
        document.getElementById('insightLoading').style.display = 'none';
        document.getElementById('chatDivider').style.display = 'flex';
        document.getElementById('chipRow').style.display = 'flex';
        document.getElementById('sendBtn').disabled = false;
        setProviderStatus('ok', '● ' + PROVIDERS[currentProvider].name);

    } catch (err) {
        showInsightError(err.message);
        setProviderStatus('err', '✕ Error');
    }
}

function buildInsightPrompt() {
    const perf    = allData.performance || [];
    const dash    = allData.dashboard   || [];
    const sproses = allData.salesmanProses || [];
    const pareto  = allData.pareto      || [];
    const tpom    = allData.tpom        || [];
    const depo    = allData.depoProses?.[0] || {};

    const perfRows = perf.filter(d => d.szname !== 'Total Depo').map(d =>
        `  • ${d.szname}: Ach ${(d.Ach*100).toFixed(1)}%, Gap ${formatRupiah(d.Gap)}, Rank #${d.Rank}`
    ).join('\n');
    const total = perf.find(d => d.szname === 'Total Depo');

    const lobRows = dash.map(d =>
        `  • ${d.LOB}: Ach ${(d['vs BP']*100).toFixed(1)}%, Actual ${formatRupiah(d.Actual)}, Gap ${formatRupiah(d.Gap)}`
    ).join('\n');

    const kpiDepo = depo['T.CR']
        ? `CR: ${depo['A.CR']}/${depo['T.CR']} (${(depo['Ach_CR']*100).toFixed(0)}%), CA: ${depo['A.CA']} (${(depo['Ach_CA']*100).toFixed(0)}%), AvgSKU: ${depo['A.AvgSKU']?.toFixed(1)}/${depo['T.AvgSKU']}, CAProd: ${(depo['Ach_CAProdAll']*100).toFixed(0)}%`
        : '-';

    const sproblemsRows = sproses.map(d => {
        const issues = [];
        if (d['Ach_CA'] < 0.6)        issues.push(`CA rendah ${(d['Ach_CA']*100).toFixed(0)}%`);
        if (d['Ach_AvgSKU'] < 0.5)    issues.push(`AvgSKU rendah ${d['A.AvgSKU']?.toFixed(1)}`);
        if (d['Ach_CAProdAll'] < 0.4)  issues.push(`CAProd rendah ${(d['Ach_CAProdAll']*100).toFixed(0)}%`);
        if (d['CR Pasif'] < -30)       issues.push(`CR Pasif ${d['CR Pasif']}`);
        return issues.length ? `  • ${d.szname}: ${issues.join(', ')}` : null;
    }).filter(Boolean).join('\n');

    const paretoIssues = pareto
        .filter(d => d[' Gap MTD'] < -10000000)
        .sort((a,b) => a[' Gap MTD'] - b[' Gap MTD']).slice(0, 5)
        .map(d => `  • ${d.szname} → ${d['Nama Pelanggan']}: Gap ${formatRupiah(d[' Gap MTD'])}`)
        .join('\n');

    const pomIssues = tpom.filter(d => d.Ach_POM < 0.5).slice(0, 5)
        .map(d => `  • ${d.szname} - ${d.NickName}: ${(d.Ach_POM*100).toFixed(0)}% (${d['A.POM']}/${d['T.POM']})`)
        .join('\n');

    return `Kamu adalah AI analis sales untuk "${perf[0]?.['Nama Depo'] || 'Depo'}".

=== PERFORMANCE SALESMAN ===
${perfRows}
Total Depo: Ach ${total ? (total.Ach*100).toFixed(1) : '-'}%, Gap ${total ? formatRupiah(total.Gap) : '-'}

=== LOB BREAKDOWN ===
${lobRows}

=== KPI PROSES DEPO ===
${kpiDepo}

=== MASALAH KPI SALESMAN ===
${sproblemsRows || '  Semua dalam batas normal'}

=== PARETO OUTLET KRITIS ===
${paretoIssues || '  Tidak ada outlet kritis'}

=== POM ACHIEVEMENT RENDAH ===
${pomIssues || '  Semua POM dalam batas normal'}

Berikan analisis dalam format JSON persis (tanpa markdown):
{
  "ringkasan": "2-3 kalimat kondisi overall, sebutkan achievement total, LOB bermasalah, dan tren umum",
  "masalah": ["masalah 1 spesifik dengan nama/angka", "masalah 2", "masalah 3", "masalah 4"],
  "rekomendasi": ["aksi 1 konkret dengan nama target", "aksi 2", "aksi 3", "aksi 4"]
}`;
}

// ═══════════════════════════════════════════════
//  RENDER INSIGHT CARDS
// ═══════════════════════════════════════════════
function renderInsightCards(raw) {
    let data;
    try {
        const clean = raw.replace(/```json|```/g, '').trim();
        data = JSON.parse(clean);
    } catch {
        data = { ringkasan: raw, masalah: [], rekomendasi: [] };
    }

    const container = document.getElementById('insightCards');
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.gap = '12px';
    container.innerHTML = '';

    const c1 = document.createElement('div');
    c1.className = 'insight-card card-summary';
    c1.innerHTML = `
        <div class="insight-card-header">
            <span class="insight-card-icon">📊</span>
            <span class="insight-card-title">Ringkasan Kondisi</span>
        </div>
        <div class="insight-card-body">${escapeHtml(data.ringkasan)}</div>`;
    container.appendChild(c1);

    if (data.masalah?.length) {
        const c2 = document.createElement('div');
        c2.className = 'insight-card card-gap';
        c2.innerHTML = `
            <div class="insight-card-header">
                <span class="insight-card-icon">⚠️</span>
                <span class="insight-card-title">Masalah Terdeteksi</span>
            </div>
            <div class="insight-card-body"><ul>${data.masalah.map(m=>`<li>${escapeHtml(m)}</li>`).join('')}</ul></div>`;
        container.appendChild(c2);
    }

    if (data.rekomendasi?.length) {
        const c3 = document.createElement('div');
        c3.className = 'insight-card card-rekomendasi';
        c3.innerHTML = `
            <div class="insight-card-header">
                <span class="insight-card-icon">🎯</span>
                <span class="insight-card-title">Rekomendasi Aksi</span>
            </div>
            <div class="insight-card-body"><ul>${data.rekomendasi.map(r=>`<li>${escapeHtml(r)}</li>`).join('')}</ul></div>`;
        container.appendChild(c3);
    }
}

// ═══════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════
async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isLoading) return;
    input.value = '';
    autoResize(input);
    toggleSendBtn();
    addChatMsg('user', text);
    scrollToBottom();
    await askAI(text);
}

async function askChip(question) {
    addChatMsg('user', question);
    scrollToBottom();
    await askAI(question);
}

async function askAI(userText) {
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    setProviderStatus('warn', '⏳ Memproses...');

    const typing = showTyping();
    scrollToBottom();

    const enriched = enrichWithRelevantData(userText);
    conversationHistory.push({ role: 'user', content: enriched });

    try {
        const reply = await callAI(conversationHistory, 800);
        conversationHistory.push({ role: 'assistant', content: reply });
        typing.remove();
        addChatMsg('ai', reply);
        setProviderStatus('ok', '● ' + PROVIDERS[currentProvider].name);
        scrollToBottom();
    } catch (err) {
        typing.remove();
        const isRateLimit = err.message.toLowerCase().includes('rate limit') || err.message.includes('429');
        if (isRateLimit) {
            const other = currentProvider === 'groq' ? 'gemini' : 'groq';
            addChatMsg('ai',
                `⚠️ **Rate limit tercapai di ${PROVIDERS[currentProvider].name}.**\n\n` +
                `Coba beralih ke **${PROVIDERS[other].name}** dengan klik tombol toggle di atas, ` +
                `atau tunggu beberapa menit lagi.`
            );
            setProviderStatus('err', '✕ Rate limit');
        } else {
            addChatMsg('ai', '⚠️ Maaf, terjadi kesalahan: ' + err.message);
            setProviderStatus('err', '✕ Error');
        }
        scrollToBottom();
    } finally {
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
    }
}

function enrichWithRelevantData(question) {
    const q = question.toLowerCase();
    let extra = '';

    if (q.includes('area') || q.includes('kecamatan') || q.includes('kabupaten') || q.includes('wilayah')) {
        const d = (allData.area||[]).sort((a,b)=>a.Gap-b.Gap).slice(0,8)
            .map(d=>`${d.Kecamatan}(${d.Kabupaten}): Ach ${(d.Ach*100).toFixed(1)}%, Gap ${formatRupiah(d.Gap)}`).join('\n');
        extra += `\n\nDATA AREA:\n${d}`;
    }
    if (q.includes('channel')||q.includes('wholesaler')||q.includes('retail')||q.includes('mti')) {
        const d = (allData.channel||[]).map(d=>`${d.szname}-${d['Channel Group']}: Ach ${(d[' Ach']*100).toFixed(1)}%, Gap ${formatRupiah(d[' Gap MTD'])}`).join('\n');
        extra += `\n\nDATA CHANNEL:\n${d}`;
    }
    if (q.includes('pareto')||q.includes('outlet')||q.includes('pelanggan')||q.includes('toko')) {
        const d = (allData.pareto||[]).sort((a,b)=>a[' Gap MTD']-b[' Gap MTD']).slice(0,10)
            .map(d=>`${d.szname}→${d['Nama Pelanggan']}(${d.JKS}): Gap ${formatRupiah(d[' Gap MTD'])}`).join('\n');
        extra += `\n\nDATA PARETO:\n${d}`;
    }
    if (q.includes('cr ')||q.includes(' ca ')||q.includes('visit')||q.includes('sku')||q.includes('proses')) {
        const d = (allData.salesmanProses||[]).map(d=>
            `${d.szname}: CR ${d['A.CR']}/${d['T.CR']}(${(d['Ach_CR']*100).toFixed(0)}%), CA ${(d['Ach_CA']*100).toFixed(0)}%, SKU ${d['A.AvgSKU']?.toFixed(1)}, CAProd ${(d['Ach_CAProdAll']*100).toFixed(0)}%`
        ).join('\n');
        extra += `\n\nKPI PROSES:\n${d}`;
    }
    if (q.includes('lob')||q.includes('gppj')||q.includes('gbs')||q.includes('gen')||q.includes('brand')) {
        const d = (allData.dashboard||[]).map(d=>`${d.LOB}: Ach ${(d['vs BP']*100).toFixed(1)}%, Gap ${formatRupiah(d.Gap)}`).join('\n');
        extra += `\n\nDATA LOB:\n${d}`;
    }
    if (q.includes('pom')||q.includes('planogram')||q.includes('display')) {
        const d = (allData.tpom||[]).map(d=>`${d.szname}-${d.NickName}: ${(d.Ach_POM*100).toFixed(0)}%(${d['A.POM']}/${d['T.POM']})`).join('\n');
        extra += `\n\nDATA POM:\n${d}`;
    }
    if (q.includes('target')||q.includes('principle')) {
        const d = (allData.tsales||[]).slice(0,15).map(d=>`${d['Nama Salesman']}-${d.Principle}: T ${formatRupiah(d['T.SalesAdj'])}, Gr ${(d.GrSales*100).toFixed(1)}%`).join('\n');
        extra += `\n\nTARGET SALES:\n${d}`;
    }
    if (q.includes('minggu')||q.includes('week')||q.includes('tren')) {
        const d = (allData.pcacec||[]).filter(d=>d['SalesOrderValue']>0)
            .map(d=>`${d.szname} ${d.Week_Report}: PC ${d['Avg PC per Day']?.toFixed(1)}/hr, SO ${formatRupiah(d.SalesOrderValue)}`).join('\n');
        extra += `\n\nTREN MINGGUAN:\n${d}`;
    }
    return extra ? question + '\n\n[KONTEKS DATA:' + extra + ']' : question;
}

function addChatMsg(role, text) {
    const wrap = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    const providerTag = role === 'ai'
        ? `<span style="font-size:9px;background:${currentProvider==='groq'?'#fed7aa':'#bfdbfe'};color:${currentProvider==='groq'?'#c2410c':'#17B5C8'};padding:1px 5px;border-radius:8px;margin-left:4px;">${PROVIDERS[currentProvider].name}</span>`
        : '';
    div.innerHTML = `
        <div class="chat-label">${role==='user'?'Anda':'AI Insight'}${providerTag}</div>
        <div class="chat-bubble">${formatChatText(text)}</div>`;
    wrap.appendChild(div);
    return div;
}

function showTyping() {
    const wrap = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg ai';
    div.innerHTML = `
        <div class="chat-label">AI Insight</div>
        <div class="typing-bubble">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
    wrap.appendChild(div);
    return div;
}

// ═══════════════════════════════════════════════
//  API CALLS — GROQ & GEMINI
// ═══════════════════════════════════════════════
async function callAI(messages, maxTokens = 800) {
    if (currentProvider === 'gemini') {
        return await callGemini(messages, maxTokens);
    } else {
        return await callGroq(messages, maxTokens);
    }
}

async function callGroq(messages, maxTokens) {
    const res = await fetch(PROVIDERS.groq.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            model:       PROVIDERS.groq.model,
            messages:    [{ role: 'system', content: buildSystemPrompt() }, ...messages],
            max_tokens:  maxTokens,
            temperature: 0.3
        })
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `Groq HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '(tidak ada respons)';
}

async function callGemini(messages, maxTokens) {
    // Convert OpenAI-style messages to Gemini format
    const systemPrompt = buildSystemPrompt();
    const contents = messages.map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
    }));

    const res = await fetch(PROVIDERS.gemini.url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            system_instruction: { parts: [{ text: systemPrompt }] },
            contents: contents,
            generationConfig: {
                maxOutputTokens: maxTokens,
                temperature: 0.3
            }
        })
    });
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `Gemini HTTP ${res.status}`);
    }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '(tidak ada respons)';
}

function buildSystemPrompt() {
    const perf = allData.performance || [];
    const depoName = perf[0]?.['Nama Depo'] || 'Depo';
    const total = perf.find(d => d.szname === 'Total Depo');
    const list = perf.filter(d => d.szname !== 'Total Depo')
        .map(d => `${d.szname}: Ach ${(d.Ach*100).toFixed(1)}%, Gap ${formatRupiah(d.Gap)}, Rank #${d.Rank}`)
        .join('\n');

    return `Kamu adalah AI analis sales profesional untuk ${depoName}.
Total Achievement: ${total ? (total.Ach*100).toFixed(1) : '-'}%, Total Gap: ${total ? formatRupiah(total.Gap) : '-'}
SALESMAN:\n${list}
Data tersedia: performance, LOB, KPI proses, pareto outlet, channel, area, POM, target sales, weekly trend.
Jawab dengan akurat, bahasa Indonesia profesional, maksimal 4-5 kalimat. Sebutkan angka spesifik.`;
}

// ═══════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════
function formatRupiah(num) {
    if (!num && num !== 0) return '-';
    const abs = Math.abs(num), sign = num < 0 ? '-' : '';
    if (abs >= 1e9) return sign + 'Rp ' + (abs/1e9).toFixed(1) + 'M';
    if (abs >= 1e6) return sign + 'Rp ' + (abs/1e6).toFixed(0) + 'jt';
    return sign + 'Rp ' + abs.toLocaleString('id-ID');
}
function formatChatText(text) {
    return escapeHtml(text).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
}
function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scrollToBottom() {
    const el = document.getElementById('mainScroll');
    setTimeout(() => el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' }), 100);
}
function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,80)+'px'; }
function toggleSendBtn() {
    document.getElementById('sendBtn').disabled = !document.getElementById('chatInput').value.trim() || isLoading;
}
function showInsightError(msg) {
    document.getElementById('insightLoading').style.display = 'none';
    const wrap = document.getElementById('insightCards');
    wrap.style.display = 'flex';
    wrap.innerHTML = `<div class="error-card">❌ ${escapeHtml(msg)}<br><small>Coba ganti provider atau refresh halaman</small></div>`;
}
async function refreshInsight() {
    document.getElementById('insightCards').innerHTML = '';
    document.getElementById('insightCards').style.display = 'none';
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('chatDivider').style.display = 'none';
    document.getElementById('chipRow').style.display = 'none';
    conversationHistory = [];
    allData = {};
    await loadAllDataAndInsight();
}
</script>
